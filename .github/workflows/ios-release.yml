name: iOS Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (overrides default)'
        required: false
        default: ''

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: mobile/billister_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Determine build number
        id: build_number
        run: |
          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            echo "number=${{ github.event.inputs.build_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      # ---------------------------------------------------------------
      # Code signing (optional — only runs when secrets are configured)
      # Set up the following repository secrets to enable signing:
      #   IOS_CERTIFICATE_BASE64    — Base64-encoded .p12 signing certificate
      #   IOS_CERTIFICATE_PASSWORD  — Password for the .p12 certificate
      #   IOS_PROVISIONING_PROFILE  — Base64-encoded .mobileprovision file
      # ---------------------------------------------------------------
      - name: Install signing certificate
        if: ${{ env.IOS_CERTIFICATE_BASE64 != '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: ${{ env.IOS_PROVISIONING_PROFILE != '' }}
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS (no codesign)
        if: ${{ env.IOS_CERTIFICATE_BASE64 == '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          flutter build ios --release --no-codesign \
            --build-number=${{ steps.build_number.outputs.number }}

      - name: Build iOS (signed)
        if: ${{ env.IOS_CERTIFICATE_BASE64 != '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          flutter build ipa --release \
            --build-number=${{ steps.build_number.outputs.number }}

      - name: Upload IPA artifact
        if: ${{ env.IOS_CERTIFICATE_BASE64 != '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: billister-ios-ipa
          path: mobile/billister_app/build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Upload unsigned iOS build artifact
        if: ${{ env.IOS_CERTIFICATE_BASE64 == '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: billister-ios-unsigned
          path: mobile/billister_app/build/ios/iphoneos/Runner.app
          if-no-files-found: error
          retention-days: 30

      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/billister_app/build/ios/ipa/*.ipa
