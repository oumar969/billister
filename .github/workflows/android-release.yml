name: Android Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (overrides default)'
        required: false
        default: ''

jobs:
  build:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: mobile/billister_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Determine build number
        id: build_number
        run: |
          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            echo "number=${{ github.event.inputs.build_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --build-number=${{ steps.build_number.outputs.number }}

      - name: Build App Bundle (release)
        run: |
          flutter build appbundle --release \
            --build-number=${{ steps.build_number.outputs.number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: billister-android-apk
          path: mobile/billister_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: billister-android-aab
          path: mobile/billister_app/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/billister_app/build/app/outputs/flutter-apk/app-release.apk
